.defaultfilters:
  # throttle_avg - emporia-vue-local
  - &throttle_avg
    # average all raw readings together over a 5 second span before publishing
    throttle_average: 5s
  - &throttle_time
    # only send the most recent measurement every 60 seconds
    throttle: 60s

  # moving_avg - digitalblur
  - &moving_avg
    # we capture a new sample every 0.24 seconds, so the time can
    # be calculated from the number of samples as n * 0.24.
    sliding_window_moving_average:
      # we average over the past 2.88 seconds
      window_size: 24
      # we push a new value every 1.44 seconds
      send_every: 12
  - &invert
    # invert and filter out any values below 0.
    lambda: 'return max(-x, 0.0f);'
  - &pos
    # filter out any values below 0.
    lambda: 'return max(x, 0.0f);'
  - &abs
    # take the absolute value of the value
    lambda: 'return abs(x);'
  - &zero
    # Use for disconnected circuits to return 0
    lambda: "return 0.0f;"
  - &double
    # Use to double the measurement for 240V breakers
    multiply: 2

sensor:
  - platform: emporia_vue
    i2c_id: i2c_a
    variant: vue3
    phases:
      # Verify that this specific phase/leg is connected to correct input wire color on device listed below
      - id: phase_a
        # Vue device wire color
        input: BLACK
        # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        calibration: 0.0194
        # To calculate new calibration value use the formula <in-use calibration value> * <accurate voltage> / <reporting voltage>
        voltage:
          name: "Phase A Voltage"
          filters: [*moving_avg, *pos]
          id: phase_a_voltage
        frequency:
          name: "Phase A Frequency"
          filters: [*moving_avg, *pos]
      # Verify that this specific phase/leg is connected to correct input wire color on device listed below
      - id: phase_b
        # Vue device wire color
        input: RED
        # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        calibration: 0.0194
        # To calculate new calibration value use the formula <in-use calibration value> * <accurate voltage> / <reporting voltage>
        voltage:
          name: "Phase B Voltage"
          filters: [*moving_avg, *pos]
          id: phase_b_voltage
        phase_angle:
          name: "Phase B Phase Angle"
          filters: [*moving_avg, *pos]
    ct_clamps:
      # Do not specify a name for any of the power sensors here, only an id. This leaves the power sensors internal to ESPHome.
      # These non-throttled power sensors are used for accurately calculating energy.
      # Copy sensors defined later will filter and then send power measurements to Home Assistant.
      # Do not specify a name for any of the power sensors here, only an id. This leaves the power sensors internal to ESPHome.
      # Copy sensors will filter and then send power measurements to HA
      # These non-throttled power sensors are used for accurately calculating energy
      - phase_id: phase_a
        input: "A"  # Verify the CT going to this device input also matches the phase/leg
        power:
          id: phase_a_power
          filters: [*pos]
        current:
          id: phase_a_current
          filters: [multiply: .5]
      - phase_id: phase_b
        input: "B"  # Verify the CT going to this device input also matches the phase/leg
        power:
          id: phase_b_power
          filters: [*pos]
        current:
          id: phase_b_current
          filters: [multiply: .4]
      # Main Service CT Clamps (up to 3)
      # Verify the correct input on the device is connected to the CT clamp phase defined (Vue 3 inputs are inverted)
      #- { input: "A", phase_id: phase_a, power: { id: phase_a_power, filters: *invert }, current: { id: phase_a_current } }
      #- { input: "B", phase_id: phase_b, power: { id: phase_b_power, filters: *invert }, current: { id: phase_b_current } }
      # - { input: "C", phase_id: phase_c, power: { id: phase_c_power, filters: *invert } }

      # Circuit CT Clamps (up to 16)
      # Pay close attention to set the phase_id for each breaker by matching it to the phase/leg it connects to in the panel
      # Use *abs filter to always take the positive absolute value
      # Use *invert filter for inverted positive values (Vue 3 inputs are inverted) or *zero for un-used inputs
      # Use *double filter for double (240v) breakers (this will assume power is evenly divided between the two legs)
      # example for double breaker
      #- { phase_id: phase_a, input: "9", power: { name: "Breaker 2a", id: circuit_9, filters: [ *moving_avg, *invert, multiply: 2 ] } }
      # example for phase b
      #- { phase_id: phase_b, input: "10", power: { name: "Breaker 2b - XYZ", id: circuit_10, filters: [ *moving_avg, *invert ] } }
      - { input: "1",  phase_id: phase_a, power: { id: c1_pwr,  filters: [ *abs ] }, current: { id: c1_cur,  filters: [ *abs ] } } 
      - { input: "2",  phase_id: phase_b, power: { id: c2_pwr,  filters: [ *abs ] }, current: { id: c2_cur,  filters: [ *abs ] } }   
      - { input: "3",  phase_id: phase_a, power: { id: c3_pwr,  filters: [ *abs ] }, current: { id: c3_cur,  filters: [ *abs ] } }  
      - { input: "4",  phase_id: phase_a, power: { id: c4_pwr,  filters: [ *abs, *double ] }, current: { id: c4_cur,  filters: [ *abs, *double ] } } 
      - { input: "5",  phase_id: phase_a, power: { id: c5_pwr,  filters: [ *abs ] }, current: { id: c5_cur,  filters: [ *abs ] } } 
      - { input: "6",  phase_id: phase_b, power: { id: c6_pwr,  filters: [ *abs ] }, current: { id: c6_cur,  filters: [ *abs ] } } 
      - { input: "7",  phase_id: phase_a, power: { id: c7_pwr,  filters: [ *abs ] }, current: { id: c7_cur,  filters: [ *abs ] } } 
      - { input: "8",  phase_id: phase_b, power: { id: c8_pwr,  filters: [ *abs ] }, current: { id: c8_cur,  filters: [ *abs ] } } 
      - { input: "9",  phase_id: phase_b, power: { id: c9_pwr,  filters: [ *abs ] }, current: { id: c9_cur,  filters: [ *abs, multiply: .48 ] } } 
      - { input: "10", phase_id: phase_b, power: { id: c10_pwr, filters: [ *abs ] }, current: { id: c10_cur,  filters: [ *abs ] } } 
      - { input: "11", phase_id: phase_a, power: { id: c11_pwr, filters: [ *abs ] }, current: { id: c11_cur,  filters: [ *abs ] } } 
      - { input: "12", phase_id: phase_b, power: { id: c12_pwr, filters: [ *abs ] }, current: { id: c12_cur,  filters: [ *abs ] } } 
      - { input: "13", phase_id: phase_a, power: { id: c13_pwr, filters: [ *abs ] }, current: { id: c13_cur,  filters: [ *abs ] } } 
      - { input: "14", phase_id: phase_b, power: { id: c14_pwr, filters: [ *abs ] }, current: { id: c14_cur,  filters: [ *abs ] } } 
      - { input: "15", phase_id: phase_a, power: { id: c15_pwr, filters: [ *abs ] }, current: { id: c15_cur,  filters: [ *abs ] } } 
      - { input: "16", phase_id: phase_a, power: { id: c16_pwr, filters: [ *abs ] }, current: { id: c16_cur,  filters: [ *abs ] } } 

    # Update total power and balance power readings at the same time.
    on_update:
      then:
        - component.update: total_power
        - component.update: balance_power

      
  # The total power sensor will be updated after all power sensors update via on_update trigger.
  - platform: template
    lambda: return id(phase_a_power).state + id(phase_b_power).state;
    id: total_power
    update_interval: never
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - platform: template
    name: "Total Current"
    lambda: return id(phase_a_current).state + id(phase_b_current).state;
    id: total_current
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Total Voltage"
    lambda: return id(phase_a_voltage).state + id(phase_b_voltage).state;
    id: total_voltage
    update_interval: 1s
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"

  - platform: template
    name: "Total Current Power"
    lambda: return id(total_power).state / id(total_voltage).state;
    id: total_current_power
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Laundry & Water Outlets Current Power"
    lambda: return id(c1_pwr).state / id(phase_a_voltage).state;
    id: c1_cur_power
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Kitchen East Outlets Current Power"
    lambda: return id(c2_pwr).state / id(phase_b_voltage).state;
    id: c2_cur_power
    update_interval: 1s
