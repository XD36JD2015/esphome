esphome:
  name: house-power-meter
  friendly_name: House Power Meter
  comment: House Power Meter

substitutions:
  # Circuit Labels used for publishing to Home Assistant
  circuit_1:  "Laundry & Water Outlets"
  circuit_2:  "Kitchen East Outlets"
  circuit_3:  "Dining Room and Porch Outlets"
  circuit_4:  "Oven-Stove"
  circuit_5:  "Dishwasher"
  circuit_6:  "Basement North Outlets"
  circuit_7:  "Refrigerator"
  circuit_8:  "Garage"
  circuit_9:  "Air Conditioner"
  circuit_10: "Basement Center Outlets"
  circuit_11: "Living Room"
  circuit_12: "Attic and Ed's Fan"
  circuit_13: "Basement West"
  circuit_14: "Furnace Outlet"
  circuit_15: "Basement Outlets"
  circuit_16: "Kitchen and Basement North Outlets"

  # Icons for Home Assistant
  icon_circuit: "mdi:power-plug"
  icon_current: "mdi:current-ac"
  icon_meter:   "mdi:meter-electric"
  icon_phase:   "mdi:angle-acute"
  icon_power:   "mdi:transmission-tower-import"
  icon_voltage: "mdi:transmission-tower"

external_components:
  - source: github://emporia-vue-local/esphome@dev
#  - source: github://digiblur/esphome-vue3@dev
    components:
      - emporia_vue

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

logger:
  logs:
    sensor: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret house_power_meter_key

ota:
  platform: esphome
  id: 
  password: !secret house_power_meter_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .browncowalliance.io
  fast_connect: on

  # Enable fallback hotspot (captive portal) in case wifi connection fails
#  ap:
#    ssid: "House-Power-Meter"
#    password: !secret ap_wifi_password

i2c:
  sda:
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  #frequency: 125kHz  # recommended range is 50-200kHz, was 200kHz but 150kHz stops errors (2024.8)
  frequency: 400kHz  # recommended range is 50-200kHz
  timeout: 1ms
  id: i2c_a

light:
  - platform: status_led
    #name: "D3_LED"
    id: wifi_led
    #pin: 2
    pin:
      number: 2
      ignore_strapping_warning: true
    restore_mode: ALWAYS_OFF
    #entity_category: config
  - platform: status_led
    #name: "D31_LED"
    id: ethernet_led
    pin: 4
    restore_mode: ALWAYS_OFF
    #entity_category: config

switch:
  - platform: restart
    name: Restart  
  - platform: safe_mode
    name: Restart (Safe Mode)
    id: safe_mode_button
    icon: mdi:restart-alert

time:
  - platform: homeassistant
    id: homeassistant_time    

