esphome:
  name: shop-power-meter
  friendly_name: Shop Power Meter
  comment: Shop Power Meter

substitutions:

  # Icons for Home Assistant
  icon_circuit: "mdi:power-plug"
  icon_current: "mdi:current-ac"
  icon_meter:   "mdi:meter-electric"
  icon_phase:   "mdi:angle-acute"
  icon_power:   "mdi:transmission-tower-import"
  icon_voltage: "mdi:transmission-tower"

external_components:
  - source: github://emporia-vue-local/esphome@dev
#  - source: github://digiblur/esphome-vue3@dev
    components:
      - emporia_vue

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

logger:
  logs:
    sensor: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret shop_power_meter_key

ota:
  platform: esphome
  id:
  password: !secret shop_power_meter_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .browncowalliance.io
  fast_connect: on
  manual_ip:
    static_ip: 10.0.31.34
    subnet: 255.255.255.0
    gateway: 10.0.31.1


  # Enable fallback hotspot (captive portal) in case wifi connection fails
#  ap:
#    ssid: "House-Power-Meter"
#    password: !secret ap_wifi_password

i2c:
  sda:
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  #frequency: 125kHz  # recommended range is 50-200kHz, was 200kHz but 150kHz stops errors (2024.8)
  frequency: 400kHz  # recommended range is 50-200kHz
  timeout: 1ms
  id: i2c_a

light:
  - platform: status_led
    #name: "D3_LED"
    id: wifi_led
    #pin: 2
    pin:
      number: 2
      ignore_strapping_warning: true
    restore_mode: ALWAYS_OFF
    #entity_category: config
  - platform: status_led
    #name: "D31_LED"
    id: ethernet_led
    pin: 4
    restore_mode: ALWAYS_OFF
    #entity_category: config

switch:
  - platform: restart
    name: Restart  
  - platform: safe_mode
    name: Restart (Safe Mode)
    id: safe_mode_button
    icon: mdi:restart-alert

time:
  - platform: homeassistant
    id: homeassistant_time    

# these are called references in YAML. They allow you to reuse
# this configuration in each sensor, while only defining it once

.defaultfilters:
  # throttle_avg - emporia-vue-local
  - &throttle_avg
    # average all raw readings together over a 5 second span before publishing
    throttle_average: 5s
  - &throttle_time
    # only send the most recent measurement every 60 seconds
    throttle: 60s

  # moving_avg - digitalblur
  - &moving_avg
    # we capture a new sample every 0.24 seconds, so the time can
    # be calculated from the number of samples as n * 0.24.
    sliding_window_moving_average:
      # we average over the past 2.88 seconds
      window_size: 24
      # we push a new value every 1.44 seconds
      send_every: 12
  - &invert
    # invert and filter out any values below 0.
    lambda: 'return max(-x, 0.0f);'
  - &pos
    # filter out any values below 0.
    lambda: 'return max(x, 0.0f);'
  - &abs
    # take the absolute value of the value
    lambda: 'return abs(x);'
  - &zero
    # Use for disconnected circuits to return 0
    lambda: "return 0.0f;"
  - &double
    # Use to double the measurement for 240V breakers
    multiply: 2

sensor:
  - platform: emporia_vue
    variant: vue3
    i2c_id: i2c_a
    phases:
      # Verify that this specific phase/leg is connected to correct input wire color on device listed below
      - id: phase_a
        # Vue device wire color
        input: BLACK
        # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        calibration: 0.0194
        # To calculate new calibration value use the formula <in-use calibration value> * <accurate voltage> / <reporting voltage>
        voltage:
          name: "Phase A Voltage"
          filters: [*moving_avg, *pos]
          id: phase_a_voltage
        frequency:
          name: "Phase B Frequency"
          filters: [*moving_avg, *pos]
      # Verify that this specific phase/leg is connected to correct input wire color on device listed below
      - id: phase_b
        # Vue device wire color
        input: RED
        # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        calibration: 0.0194
        # To calculate new calibration value use the formula <in-use calibration value> * <accurate voltage> / <reporting voltage>
        voltage:
          name: "Phase B Voltage"
          filters: [*moving_avg, *pos]
          id: phase_b_voltage
        phase_angle:
          name: "Phase A Phase Angle"
          filters: [*moving_avg, *pos]
    ct_clamps:
      # Do not specify a name for any of the power sensors here, only an id. This leaves the power sensors internal to ESPHome.
      # These non-throttled power sensors are used for accurately calculating energy.
      # Copy sensors defined later will filter and then send power measurements to Home Assistant.
      # Do not specify a name for any of the power sensors here, only an id. This leaves the power sensors internal to ESPHome.
      # Copy sensors will filter and then send power measurements to HA
      # These non-throttled power sensors are used for accurately calculating energy
      - phase_id: phase_a
        input: "A"  # Verify the CT going to this device input also matches the phase/leg
        power:
          id: phase_a_power
          device_class: power
          filters: [*pos]
        current:
          id: phase_a_current
          filters: [multiply: .33]
      - phase_id: phase_b
        input: "B"  # Verify the CT going to this device input also matches the phase/leg
        power:
          id: phase_b_power
          device_class: power
          filters: [*pos]
        current:
          id: phase_b_current
          filters: [multiply: .33]
      # Main Service CT Clamps (up to 3)
      # Verify the correct input on the device is connected to the CT clamp phase defined (Vue 3 inputs are inverted)
      #- { input: "A", phase_id: phase_a, power: { id: phase_a_power, filters: *invert }, current: { id: phase_a_current } }
      #- { input: "B", phase_id: phase_b, power: { id: phase_b_power, filters: *invert }, current: { id: phase_b_current } }
      # - { input: "C", phase_id: phase_c, power: { id: phase_c_power, filters: *invert } }

      # Circuit CT Clamps (up to 16)
      # Pay close attention to set the phase_id for each breaker by matching it to the phase/leg it connects to in the panel
      # Use *abs filter to always take the positive absolute value
      # Use *invert filter for inverted positive values (Vue 3 inputs are inverted) or *zero for un-used inputs
      # Use *double filter for double (240v) breakers (this will assume power is evenly divided between the two legs)
      # example for double breaker
      #- { phase_id: phase_a, input: "9", power: { name: "Breaker 2a", id: circuit_9, filters: [ *moving_avg, *invert, multiply: 2 ] } }
      # example for phase b
      #- { phase_id: phase_b, input: "10", power: { name: "Breaker 2b - XYZ", id: circuit_10, filters: [ *moving_avg, *invert ] } }


    # Update total power and balance power readings at the same time.
    on_update:
      then:
        - component.update: total_power
      
  # The total power sensor will be updated after all power sensors update via on_update trigger.
  - platform: template
    lambda: return id(phase_a_power).state + id(phase_b_power).state;
    id: total_power
    update_interval: never
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - platform: template
    name: "Total Current"
    lambda: return id(phase_a_current).state + id(phase_b_current).state;
    id: total_current
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Total Voltage"
    lambda: return id(phase_a_voltage).state + id(phase_b_voltage).state;
    id: total_voltage
    update_interval: 1s
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"

  - platform: template
    name: "Total Current Power"
    lambda: return id(total_power).state / id(total_voltage).state;
    id: total_current_power
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Phase A Current Power"
    lambda: return (id(phase_a_power).state / 2 ) / id(phase_a_voltage).state;
    id: phase_a_cur_power
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Phase B Current Power"
    lambda: return ( id(phase_b_power).state /2 ) / id(phase_b_voltage).state;
    id: phase_b_cur_power
    update_interval: 1s
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  # Copy sensors to publish the each power state to Home Assistant.
  - { platform: copy, name: "Phase A Power", source_id: phase_a_power, filters: *moving_avg, accuracy_decimals: 2, icon: $icon_power }
  - { platform: copy, name: "Phase B Power", source_id: phase_b_power, filters: *moving_avg, accuracy_decimals: 2, icon: $icon_power }
  - { platform: copy, name: "Total Power",   source_id: total_power,   filters: *moving_avg, accuracy_decimals: 2, icon: $icon_power }


  # Copy sensors to publish the each current state to Home Assistant.

  - { platform: copy, name: "Phase A Current", source_id: phase_a_current, filters: *abs, accuracy_decimals: 2, icon: $icon_current }
  - { platform: copy, name: "Phase B Current", source_id: phase_b_current, filters: *abs, accuracy_decimals: 2, icon: $icon_current }

  # The total daily energy sensors to be published to Home Assistant
  - { platform: total_daily_energy, name: "Total Daily Energy", power_id: total_power,     filters: *throttle_time, accuracy_decimals: 0, restore: false, icon: $icon_meter }
