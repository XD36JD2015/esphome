#for documentation see project at https://github.com/Dilbert66/esphome-VistaECP
substitutions:
  name: "alarm-system-shop" #unique network name, system name
  friendlyName: "Shop Alarm System"  #used as the friendly name of your application in HomeAssistant
  panelId: "alarm_system_shop"         #used as the service variable name.
  device_description: Shop Alarm System

vista_alarm_panel:
  id: $panelId
  accesscode: !secret access_code_shop #Only comes into effect if needed for arming and quickarm is not set
  maxzones: "32" #maximum amount of zones that your panel supports
  maxpartitions: "1" #maximum amount of partitions that your panel supports

  # Enroll your RF serial devices here. Format: serial#:loop#:zone#  Each record is comma separated.
  # For most devices loop1 is used such as 5800pir, other devices such as 5816 will use loop2.  Please refer to your
  # RF device programming (*56 program) to see what loop and zones are assigned to your RF devices. 
  # You can refer to the pdf link below for more details on loop numbers 
  # https://advancedsecurityllc.com/wp-content/uploads/5800%20Wireless%20Device%20List.pdf
  #
  # Note: These entries are used to identify and report immediate open/close/battery
  # activities directly from your RF devices, bypassing the panel. This is beneficial
  # since the panel only reports open events to the keypads. The firmware will work fine
  # without these entries except you will have a delay of TTL milliseconds before 
  # the report of closed zones. 
  rfseriallookup: "" # serial1:loop#:zone1,serial2:loop#:zone2
 
  defaultpartition: "1" #set to your main partition
  vistadebuglevel: "3" #component debug level for messages

  #assign a new virtual keypad address to each active partition using programs *190 - *196
  #and enter it below.  For unused partitions, use 0 as the keypad address.
  keypadaddr1: "17" #partition 1 virtual keyapd
  keypadaddr2: "0" #partition 2 virtual keypad. set to 0 to disable
  keypadaddr3: "0" #partition 3 virtual keypad. set to 0 to disable

  auiaddr: "1" #AUI address from program field *189 to use for zone status queries. Ensure it is not assigned to a real keypad.

  ##esp32
  #rxpin: "22" #GPIO pin to use for data receive (yellow line) 
  #txpin: "21" #GPIO pin to use for data transmit (green line)
  #monitorpin: "18" #GPIO pin to use for monitoring module traffic such as RF or Expanders . Set to -1 to disable

  #input mode control
  #invert_mon: "true"
  #invert_rx: "true"
  #invert_tx: "true"
  #input_mode_rx: INPUT
  #input_mode_mon: INPUT

  ##esp8266
  rxpin: "5" #GPIO pin to use for data receive (yellow line) 
  txpin: "4" #GPIO pin to use for data transmit (green line)
  monitorpin: "14" #GPIO pin to use for monitoring module traffic such as RF or Expanders . Set to -1 to disable

  #note for the vista128 and vista250, the expanderaddr and relayaddr addresses must be 0
  # module addresses:
  # 07 4229 zone expander  zones 9-16
  # 08 4229 zone expander zones 17-24
  # 09 4229 zone expander zones 25-32
  # 10 4229 zone expander zones 33-40
  # 11 4229 zone expander zones 41 48
  # 12 4204 relay module  
  # 13 4204 relay module
  # 14 4204 relay module
  # 15 4204 relay module

  expanderaddr1: "07" # 1st zone expander emulator (4229) address to use . Set to 0 to disable. 
  expanderaddr2: "0" # 2nd expander emulator address to use . Set to 0 to disable. 
  
  relayaddr1: "0" # relay module emulation (4204) addresses. Set to 0 to disable
  relayaddr2: "0"
  relayaddr3: "0"
  relayaddr4: "0"
  
  ttl: "30000"  # time  to live  in ms for zone/fire status before expiring;
  quickarm: "false"
  lrrsupervisor: "true" # set to true if we don't have an LRR monitoring supervisor  we can emulate one to get the statuses

    #enable use of second esp32 core for async polling of panel data. default: true
  # set to false if you get watchdog errors
  use_async_polling: false

  clean_build: "false" #default is false.  only set to true if getting duplication errors in linking step. Once you compile, reset it back to false.  
  
#esp32:
#  board: nodemcu-32s
#  framework: 
#    type: arduino
#    version: recommended

esp8266:
  board: nodemcuv2
  framework:
    version: recommended

#location of alarm panel code.  You can use the github release version  or 
#copy the code to directory "my_components" in your main esphome directory
# see here for more info: https://esphome.io/components/external_components    
external_components:
  #- source: github://XD36JD2015/esphome-components@dev #uncomment to use github repository
  - source: github://Dilbert66/esphome-components@dev #uncomment to use github repository
  #- source:  my_components #uncomment to use local directory  
    components: [vista_alarm_panel] 
  #  refresh: 10min
    refresh: never
  
esphome:
  name: $name
  friendly_name: $friendlyName
  comment: ${device_description}

#Example of how to set the panel time from the esp time on bootup  
#  on_boot:
#    priority: -100
#    then:
#      - delay: 30s
#      - lambda: |-
#            $panelId->set_panel_time(); 
  
# output sympols to output.map for debugging. you can remove if not needed
#  platformio_options:
#    build_flags: 
#        - "-Wl,-Map,output.map"  

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .browncowalliance.io
  fast_connect: on

logger:
  baud_rate: 115200
  level: DEBUG

api:
   encryption:
     key: !secret encryption_key
   custom_services: true 

safe_mode: 
  
ota:
   password: !secret ota_password
   platform: esphome
   on_begin:
          switch.turn_off: connection_status_switch 

time:
  - platform: homeassistant
    id: homeassistant_time    

######################################################################## 
# Edit binary and text sensors below to suit your alarm setup.
# You can safely add or remove any sensor as needed. 
# The id code is entered using the "id:" tag.  Alternatively you can
# add the id code in round brackets  at the end of the sensor name: eg. (z1)
binary_sensor:

### zone sensors ###
# open/close status for each zone 
# zone id code = z+zone number
  - platform: vista_alarm_panel
    id: z1
    name: "Heat Detector"
    device_class: heat
    trigger_on_initial_state: true       

  - platform: vista_alarm_panel
    id: z2
    name: "Man Door"
    device_class: door   
    trigger_on_initial_state: true       

  - platform: vista_alarm_panel
    name: "Left Garage Door"
    id: z3
    device_class: garage_door  
    trigger_on_initial_state: true         

  - platform: vista_alarm_panel
    id: z4
    name: "Motion Sensor"
    device_class: motion   
    trigger_on_initial_state: true        

  - platform: vista_alarm_panel
    id: z5
    name: "Glass Break Sensor"
    device_class: sound     
    trigger_on_initial_state: true       

  - platform: vista_alarm_panel
    id: z6
    name: "Right Garage Door"
    device_class: garage_door
    trigger_on_initial_state: true

#house doors
  - platform: vista_alarm_panel
    id: z9
    trigger_on_initial_state: true  
    device_class: door

#house fire alarm
  - platform: vista_alarm_panel
    id: z10 
    trigger_on_initial_state: true  
    device_class: smoke

#house alarm
  - platform: vista_alarm_panel
    id: z11 
    trigger_on_initial_state: true  
    device_class: safety

#house windows
  - platform: vista_alarm_panel
    id: z12 
    trigger_on_initial_state: true  
    device_class: window

  - platform: vista_alarm_panel
    id: z95
    name: "Fire Button"
    device_class: smoke
    trigger_on_initial_state: true  

  - platform: vista_alarm_panel
    id: z99
    name: "Panic Button"
    device_class: safety
    trigger_on_initial_state: true          

# you can also add fields to show fault statuses of other devices you have.  The id will be 1 + device address.  

#relay addresses are 12/13/14/15
#  - platform: template
#    id_code: z112    
#    name: "check relay 12 (z112)"  
#    device_class: problem
#    trigger_on_initial_state: true      

#zone expander device addresses are 07/08/09/10/11
  - platform: vista_alarm_panel
    id: z107
    name: "check expander 07"  
    device_class: problem
    trigger_on_initial_state: true 

#comm device address such as Alarmnet/LRR is 03
  - platform: vista_alarm_panel
    id: z103    
    name: "check comm device"  
    device_class: problem
    trigger_on_initial_state: true            

### non zone sensors ###

# partition ready status
# ready id code = rdy_ + partition number
  - platform: vista_alarm_panel
    id: rdy_1
    name: "Ready"
    trigger_on_initial_state: true

# partition/panel trouble status 
# trouble id code = trbl_ + partition number
  - platform: vista_alarm_panel
    id: trbl_1
    name: "Trouble"
    device_class: problem
    trigger_on_initial_state: true

# bypass zones active status
# bypass id code = byp_ + partition number   
  - platform: vista_alarm_panel
    id: byp_1
    name: "Bypass"
    trigger_on_initial_state: true

# armed away status
# armed away id code = arma_ + partition number 
  - platform: vista_alarm_panel
    id: arma_1
    name: "Away"
    trigger_on_initial_state: true

# armed status 
# armed id code = arm_ + partition number
  - platform: vista_alarm_panel
    id: arm_1
    name: "Armed"
    trigger_on_initial_state: true

# armed stay status
# armed stay id code = arms_ + partition number
  - platform: vista_alarm_panel
    id: arms_1
    name: "Stay"
    trigger_on_initial_state: true

# armed instant status
# armed instant id code = armi_ + partition number    
  - platform: vista_alarm_panel
    id: armi_1
    name: "Instant"
    trigger_on_initial_state: true

# armed night status
# armed night id code = armn_ + partition number    
  - platform: vista_alarm_panel
    id: armn_1
    name: "Night"
    trigger_on_initial_state: true

# ac status
# ac id code = (ac)     
  - platform: vista_alarm_panel
    id: ac
    name: "AC"
    device_class: plug  
    trigger_on_initial_state: true    

# chime status
# chime id code = chm_ + partition number  
  - platform: vista_alarm_panel
    id: chm_1
    name: "Chime"
    device_class: sound
    trigger_on_initial_state: true

# alarm status
# alarm id code = alm_ + partition number   
  - platform: vista_alarm_panel
    id: alm_1
    name: "Alarm"
    device_class: safety
    trigger_on_initial_state: true    

# battery status
# battery id code = bat  
  - platform: vista_alarm_panel
    id: bat
    name: "Battery"
    device_class: battery
    trigger_on_initial_state: true    

# fire alarm status
# fire alarm id code = fire_ + partition number 
  - platform: vista_alarm_panel
    id: fire_1
    name: "Fire"
    device_class: safety
    trigger_on_initial_state: true

#house doors combined
  - platform: template
    id: house_doors
    trigger_on_initial_state: true
    lambda: |-
      if (id(house_front_door).state || id(house_back_door).state || id(house_side_door).state || id(house_basement_door).state) {
        return true;
      } else {
        return false;
      }
    on_press:
      lambda: |-
        $panelId->set_zone_fault(9,1);
    on_release:
      lambda: |-
        $panelId->set_zone_fault(9,0);

#house door zones
  - platform: homeassistant
    id: house_front_door
    entity_id: binary_sensor.alarm_system_z1
    trigger_on_initial_state: true

#house door zone
  - platform: homeassistant
    id: house_back_door
    entity_id: binary_sensor.alarm_system_z2
    trigger_on_initial_state: true

#house door zone
  - platform: homeassistant
    id: house_side_door
    entity_id: binary_sensor.alarm_system_z3
    trigger_on_initial_state: true

#house door zone
  - platform: homeassistant
    id: house_basement_door
    entity_id: binary_sensor.alarm_system_z4
    trigger_on_initial_state: true

#house fire zone
# Echo guard: only mirror the house's fire alarm in while our own fire
# output is idle — if we're already alarming, the house's alarm is our
# own echo and mirroring it back would re-trigger us after acknowledge,
# leaving both panels endlessly re-tripping each other.
  - platform: homeassistant
    id: house_fire
    entity_id: binary_sensor.alarm_system_fire_1
    trigger_on_initial_state: true
    on_press:
      - if:
          condition:
            binary_sensor.is_off: fire_1
          then:
            - lambda: |-
                $panelId->set_zone_fault(10,1);
    on_release:
      - lambda: |-
          $panelId->set_zone_fault(10,0);

#house alarm zone
# Echo guard: see house_fire comment above.
  - platform: homeassistant
    id: house_alarm
    entity_id: binary_sensor.alarm_system_alm_1
    trigger_on_initial_state: true
    on_press:
      - if:
          condition:
            binary_sensor.is_off: alm_1
          then:
            - lambda: |-
                $panelId->set_zone_fault(11,1);
    on_release:
      - lambda: |-
          $panelId->set_zone_fault(11,0);

#house windows combined
  - platform: template
    id: house_windows
    trigger_on_initial_state: true
    lambda: |-
      if (id(house_ed_window1).state || id(house_ed_window2).state) {
        return true;
      } else {
        return false;
      }
    on_press:
      lambda: |-
        $panelId->set_zone_fault(12,1);
    on_release:
      lambda: |-
        $panelId->set_zone_fault(12,0);

#eds room window 1
  - platform: homeassistant
    id: house_ed_window1
    entity_id: binary_sensor.alarm_system_z22
    trigger_on_initial_state: true

#eds room window 2
  - platform: homeassistant
    id: house_ed_window2
    entity_id: binary_sensor.alarm_system_z23
    trigger_on_initial_state: true

#### text sensors ####
text_sensor:

#alternative zone status as a text sensor. Values:  O=open, B=bypass,T=trbl or check,A=alarm
# zone id code = z+zone number
#  - platform: template
#    name: "Shop Heat Detector z1"
#    id_code: z1s

# system status messages
# system status id code = ss_ + partition number  
  - platform: vista_alarm_panel
    id: ss_1
    name: "System Status"
    icon: "mdi:shield"

# long range radio messages
# lrr id code = lrr 
  - platform: vista_alarm_panel
    id: lrr
    name: "Lrr Msg"
    icon: "mdi:alert-box"

# RF zone messages
# RF id code = rf  
#  - platform: template
#    id_code: rf  
#    name: "RF Msg (rf)"
#    icon: "mdi:alert-box"    

# virtual lcd keypad line1 and line2 messages for each partition   
# partition line1 id code = ln1_ + partition number
# partition line2 id code = ln2_ + partition number
# partition 1
  - platform: vista_alarm_panel
    id: ln1_1
    name: "Line1"
    icon: "mdi:message-text" 

  - platform: vista_alarm_panel
    id: ln2_1
    name: "Line2"
    icon: "mdi:message-text"

# zone status messages bypas/open/alarm
# zone status id code = zs
  - platform: vista_alarm_panel
    id: zs
    name: "Zone Status" 
    icon: "mdi:message-text"  

# system beeps
# beeps id code = bp_ + partition number 
  - platform: vista_alarm_panel
    id: bp_1
    name: "Beeps" 
    icon: "mdi:volume-low" 

  - platform: template
    id: check
    name: "Check"

# end of panel sensor setup - no need to edit anything below.
##############################################################################

switch:
  - platform: template
    name: "Connection"
    id: connection_status_switch
    restore_mode: DISABLED    
    lambda: |-
      return $panelId->connected();
    icon: "mdi:shield-link-variant"
    turn_on_action:
      - switch.toggle: restart_switch
    turn_off_action:
      - lambda: |-
         $panelId->stop();
  - platform: restart
    id: restart_switch
  - platform: safe_mode
    name: "Safe Mode"   

debug:
  update_interval: 300s

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"   
    fragmentation: #esp8266 only
      name: "Heap Fragmentation"   
