  - platform: template
    name: "Sea Level Pressure"
    unit_of_measurement: "inHg"
    device_class: pressure
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 60s
    lambda: |-
      const float altitude = 241.5;  // <- change this to your elevation in meters
      float pressure = id(bme_pressure).state;  // hPa
      float temperature = id(temp_c).state;     // °C

      if (isnan(pressure) || isnan(temperature)) {
        return NAN;
      }

      float temp_kelvin = temperature + 273.15;
      float sea_level_pressure = pressure * pow(1 - (0.0065 * altitude) / (temp_kelvin + 0.0065 * altitude), -5.257);

      // Convert hPa to inHg
      float sea_level_pressure_inHg = sea_level_pressure * 0.029529983071445;

      return sea_level_pressure_inHg;



text_sensor:
  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "Basement IAQ Accuracy"

  - platform: template
    name: "Basement IAQ Classification"
    lambda: |-
      if ( int(id(iaq).state) <= 50) {
        return {"Excellent"};
      }
      else if (int(id(iaq).state) >= 51 && int(id(iaq).state) <= 100) {
        return {"Good"};
      }
      else if (int(id(iaq).state) >= 101 && int(id(iaq).state) <= 150) {
        return {"Lightly polluted"};
      }
      else if (int(id(iaq).state) >= 151 && int(id(iaq).state) <= 200) {
        return {"Moderately polluted"};
      }
      else if (int(id(iaq).state) >= 201 && int(id(iaq).state) <= 250) {
        return {"Heavily polluted"};
      }
      else if (int(id(iaq).state) >= 251 && int(id(iaq).state) <= 350) {
        return {"Severely polluted"};
      }
      else if (int(id(iaq).state) >= 351) {
        return {"Extremely polluted"};
      }
      else {
        return {"error"};
      }

