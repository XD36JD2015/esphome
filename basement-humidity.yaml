esphome:
  name: basement-humidity
  friendly_name: Basement Humidity
  name_add_mac_suffix: false
  platformio_options:
    build_flags:
      -DPIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48_SECHEAP_SHARED

esp8266:
  board: nodemcuv2
  framework:
    version: recommended

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret basement_humidity_api_key

ota:
  - platform: esphome
    password: !secret basement_humidity_ota_password

wifi:
  ssid: !secret wifi_ssid3
  password: !secret wifi_password3
  domain: .browncowalliance.io
  fast_connect: on

time:
  - platform: homeassistant
    id: homeassistant_time  

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true


bme68x_bsec2_i2c:
  address: 0x76
  model: bme680
  operating_age: 28d
  sample_rate: LP
  supply_voltage: 3.3V
  temperature_offset: .75


sensor:
  - platform: bme68x_bsec2
    temperature:
      name: "Basement Temperature"
      id: temp_c
      filters:
        - median
    pressure:
      name: "Basement Barometric Pressure"
      filters:
        - median
      id: bme_pressure
    humidity:
      name: "Basement Humidity"
      id: humidity
      filters:
        - median
    iaq:
      name: "BasementIAQ"
      id: iaq
      filters:
        - median
    co2_equivalent:
      name: "Basement CO2 Equivalent"
      filters:
        - median
    breath_voc_equivalent:
      name: "BasementBreath VOC Equivalent"
      filters:
        - median

