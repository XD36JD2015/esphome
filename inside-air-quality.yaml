# AirGradient ONE - Board v9
# https://www.airgradient.com/open-airgradient/instructions/overview/

substitutions:
  name: "insideairquality"
  friendly_name: "AG One"
  name_add_mac_suffix: "false"  # Must have quotes around value

# Enable Home Assistant API
api:  
  encryption:
    key: "Jy0KB6q2DNF2kZcy9wAKEoT23qTLLGTaGkt6jN77su0="

ota:
  - platform: esphome
    password: "T56nhpmkUcyFJe1n0Y4rawwWeBaym9LHKHsrCj40SUA="

wifi:
  ssid: !secret wifi_ssid3
  password: !secret wifi_password3
  domain: .browncowalliance.io
  fast_connect: on
  min_auth_mode: WPA2

#dashboard_import:
#  package_import_url: github://MallocArray/airgradient_esphome/airgradient-one.yaml
#  import_full_config: false

packages:
  board: !include /root/airgradient_esphome/inside/packages/airgradient_esp32-c3_board.yaml
#  captive_portal: github://MallocArray/airgradient_esphome/packages/captive_portal.yaml
  pm_2.5: !include /root/airgradient_esphome/inside/packages/sensor_pms5003.yaml
  co2: !include /root/airgradient_esphome/inside/packages/sensor_s8.yaml
  temp_humidity: !include /root/airgradient_esphome/inside/packages/sensor_sht40.yaml
  tvoc: !include /root/airgradient_esphome/inside/packages/sensor_sgp41.yaml
  display: !include /root/airgradient_esphome/inside/packages/display_sh1106_multi_page.yaml
  led: !include /root/airgradient_esphome/inside/packages/led.yaml
#  led_co2: !include /root/airgradient_esphome/inside/packages/led_co2.yaml
  led_pm25: !include /root/airgradient_esphome/inside/packages/led_pm25.yaml
#  airgradient_api: github://MallocArray/airgradient_esphome/packages/airgradient_api_esp32-c3.yaml
  hardware_watchdog: !include /root/airgradient_esphome/inside/packages/watchdog.yaml
  config_button: !include /root/airgradient_esphome/inside/packages/config_button.yaml
  wifi: !include /root/airgradient_esphome/inside/packages/sensor_wifi.yaml
  uptime: !include /root/airgradient_esphome/inside/packages/sensor_uptime.yaml

binary_sensor:
  - id: !extend config_button
    pin:
      ignore_strapping_warning: true  # Acknowledging that this is a strapping pin and should not have external pullup/down resistors  https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins